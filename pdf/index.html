<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Juan José Cano Duque — Curriculum Vitae</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#fff;color:#000}
  body{
    font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    font-size:10.5pt;
    line-height:1.45;
    max-width:190mm;
    margin:0 auto;
    padding:0 4mm;
  }
  a{color:#000;text-decoration:none}

  header.intro{margin-bottom:14pt}
  header.intro h1{font-size:22pt;font-weight:700;letter-spacing:-0.01em;margin-bottom:2pt}
  header.intro .title{font-size:11pt;font-weight:600;margin-bottom:6pt}
  header.intro .contact{font-size:9.5pt;margin-bottom:4pt}
  header.intro .contact a{text-decoration:underline}
  header.intro .availability{font-size:9pt;font-weight:500;margin-bottom:8pt}
  header.intro .bio{font-size:10pt;line-height:1.5}

  section{margin-top:14pt}
  section > h2{
    font-size:11pt;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.06em;
    border-bottom:0.5pt solid #000;
    padding-bottom:3pt;
    margin-bottom:8pt;
    page-break-after:avoid;
    break-after:avoid;
  }

  /* Capabilities & Highlights — list style */
  .cards{display:block}
  .cards .card{margin-bottom:8pt}
  .cards .card .kicker{font-size:8.5pt;font-weight:600;letter-spacing:0.04em;text-transform:uppercase}
  .cards .card h3{font-size:10.5pt;font-weight:600;margin:1pt 0 2pt;page-break-after:avoid;break-after:avoid}
  .cards .card p{font-size:10pt;line-height:1.45}
  .cards .card .meta{font-size:9pt;margin-top:1pt;opacity:.85}

  /* Work */
  .job{margin-bottom:10pt}
  .job h3{font-size:11pt;font-weight:700;margin-bottom:1pt;page-break-after:avoid;break-after:avoid}
  .job .where{font-size:10pt;font-weight:500;margin-bottom:1pt}
  .job .period{font-size:9.5pt;margin-bottom:4pt}
  .job ul{padding-left:14pt;margin-bottom:3pt}
  .job ul li{font-size:10pt;line-height:1.45;margin-bottom:2pt}
  .job .tags{font-size:9pt;margin-top:2pt}

  /* Skills */
  .sk-note{font-size:9.5pt;font-style:italic;margin-bottom:8pt}
  .sk-col{margin-bottom:8pt}
  .sk-col h3{font-size:10pt;font-weight:700;margin-bottom:3pt;page-break-after:avoid;break-after:avoid}
  .sk-col h3 .sub{font-weight:400;font-style:italic}
  .sk-col ul{list-style:none;padding:0}
  .sk-col li{font-size:10pt;line-height:1.4;margin-bottom:1pt;display:flex;justify-content:space-between;gap:12pt}
  .sk-col li .lvl{font-size:9pt;opacity:.85;white-space:nowrap}

  /* Education */
  .edu-item{margin-bottom:6pt}
  .edu-item h3{font-size:10.5pt;font-weight:700;page-break-after:avoid;break-after:avoid}
  .edu-item .school{font-size:9.5pt;margin-bottom:2pt}
  .edu-item p{font-size:10pt;line-height:1.45}

  .lang-list{margin-top:6pt}
  .lang-list li{font-size:10pt;list-style:none;margin-bottom:1pt}
  .lang-list li b{font-weight:600}

  /* Inline emphasis preserved from JSON content */
  b, strong{font-weight:600}
</style>
</head>
<body>

<header class="intro">
  <h1 id="name"></h1>
  <p class="title" id="title"></p>
  <p class="contact" id="contact"></p>
  <p class="availability" id="availability"></p>
  <p class="bio" id="bio"></p>
</header>

<section id="sec-capabilities">
  <h2 id="cap-h"></h2>
  <div class="cards" id="cap-list"></div>
</section>

<section id="sec-work">
  <h2 id="work-h"></h2>
  <div id="work-list"></div>
</section>

<section id="sec-highlights">
  <h2 id="hl-h"></h2>
  <div class="cards" id="hl-list"></div>
</section>

<section id="sec-skills">
  <h2 id="sk-h"></h2>
  <p class="sk-note" id="sk-note"></p>
  <div id="sk-list"></div>
</section>

<section id="sec-education">
  <h2 id="ed-h"></h2>
  <div id="ed-list"></div>
  <ul class="lang-list" id="lang-list"></ul>
</section>

<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const KNOWN_VARIANTS = ['en', 'es', 'en-ai', 'es-ai'];
  const lang = KNOWN_VARIANTS.includes(params.get('lang')) ? params.get('lang') : 'en';

  const res = await fetch('../content/' + lang + '.json');
  const data = await res.json();

  document.documentElement.lang = lang;
  document.title = data.ui.documentTitle;

  const setText = (id, v) => { document.getElementById(id).textContent = v; };
  const setHTML = (id, v) => { document.getElementById(id).innerHTML = v; };

  // Header
  setText('name', data.meta.name);
  setText('title', data.meta.title);
  document.getElementById('contact').innerHTML =
    '<a href="mailto:' + data.meta.email + '">' + data.meta.email + '</a>'
    + ' · <a href="' + data.meta.linkedin + '">' + data.meta.linkedinHandle + '</a>'
    + ' · <a href="' + data.meta.github + '">' + data.meta.githubHandle + '</a>'
    + ' · ' + data.meta.location;
  setText('availability', data.meta.availability);
  setHTML('bio', data.meta.bio);

  // Capabilities
  setText('cap-h', data.capabilities.plainHeading);
  document.getElementById('cap-list').innerHTML = data.capabilities.items.map(it => `
    <div class="card">
      <span class="kicker">${it.kicker}</span>
      <h3>${it.title}</h3>
      <p>${it.body}</p>
    </div>
  `).join('');

  // Work
  setText('work-h', data.work.plainHeading);
  document.getElementById('work-list').innerHTML = data.work.items.map(j => {
    const where = j.client ? `${j.company} · ${j.client}` : j.company;
    const tags = j.tags && j.tags.length ? `<div class="tags">${j.tags.join(' · ')}</div>` : '';
    return `
      <article class="job">
        <h3>${j.role}</h3>
        <div class="where">${where}</div>
        <div class="period">${j.period}</div>
        <ul>${j.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
        ${tags}
      </article>
    `;
  }).join('');

  // Highlights
  setText('hl-h', data.highlights.plainHeading);
  document.getElementById('hl-list').innerHTML = data.highlights.items.map(h => `
    <div class="card">
      <span class="kicker">${h.kicker}</span>
      <h3>${h.title}</h3>
      <p>${h.body}</p>
      <div class="meta">${h.metaLeft} · ${h.metaRight}</div>
    </div>
  `).join('');

  // Skills
  setText('sk-h', data.skills.plainHeading);
  setText('sk-note', data.skills.note);
  document.getElementById('sk-list').innerHTML = data.skills.columns.map(col => {
    const sub = col.subtitle ? ` <span class="sub">${col.subtitle}</span>` : '';
    return `
      <div class="sk-col">
        <h3>${col.title}${sub}</h3>
        <ul>${col.rows.map(r => `<li><span>${r.name}</span><span class="lvl">${r.level}</span></li>`).join('')}</ul>
      </div>
    `;
  }).join('');

  // Education
  setText('ed-h', data.education.plainHeading);
  document.getElementById('ed-list').innerHTML = data.education.degrees.map(d => `
    <div class="edu-item">
      <h3>${d.title}</h3>
      <div class="school">${d.school} · ${d.year}</div>
      <p>${d.body}</p>
    </div>
  `).join('');

  const langItems = data.education.languages.map(l => `<li><b>${l.name}:</b> ${l.level}</li>`);
  langItems.push(`<li><b>${data.education.hobbies.label}:</b> ${data.education.hobbies.value}</li>`);
  document.getElementById('lang-list').innerHTML = langItems.join('');
})();
</script>

</body>
</html>
