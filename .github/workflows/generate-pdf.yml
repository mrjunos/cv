name: Generate CV PDFs

on:
  push:
    branches: [main]
    paths-ignore:
      - 'cv-en.pdf'
      - 'cv-es.pdf'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install --no-audit --no-fund

      - run: npm run pdf

      - name: Commit PDFs if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add cv-en.pdf cv-es.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes — skipping commit."
          else
            git commit -m "Auto-generate CV PDFs [skip ci]"
            git push
          fi
