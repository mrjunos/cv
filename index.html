<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Juan José Cano Duque — Curriculum Vitae</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper: #f4ede0;
    --paper-2: #ebe2d1;
    --ink: #1a1714;
    --ink-soft: #4a443c;
    --ink-muted: #8a7f70;
    --rule: #d6cab2;
    --accent: oklch(0.62 0.10 235); /* glacier blue */
    --accent-soft: oklch(0.92 0.04 235);
    --max: 1180px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{background:#1a1714}
  body{background:var(--paper);color:var(--ink);font-family:'Inter Tight',system-ui,sans-serif;font-weight:400;letter-spacing:-0.005em;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;padding:0 0 140px;overflow-x:hidden}
  a{color:inherit;text-decoration:none}

  /* ============== TOP BAR ============== */
  .topbar{
    position:sticky;top:0;z-index:50;
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    background:rgba(244,237,224,.78);
    border-bottom:1px solid var(--rule);
  }
  .topbar-inner{
    max-width:var(--max);margin:0 auto;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 32px;
    font-size:13px;
  }
  .mono{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-muted)}
  .topbar nav{display:flex;gap:28px}
  .topbar nav a{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-soft);position:relative;padding:4px 0}
  .topbar nav a:hover{color:var(--ink)}
  .topbar nav a::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:1px;background:var(--ink);transform:scaleX(0);transform-origin:left;transition:transform .35s ease}
  .topbar nav a:hover::after{transform:scaleX(1)}

  /* ============== HERO ============== */
  .hero{
    max-width:var(--max);margin:0 auto;
    padding:70px 32px 40px;
    display:grid;grid-template-columns:1.4fr 1fr;grid-template-rows:auto 1fr;gap:60px;align-items:end;
    position:relative;
  }
  .hero-main{grid-column:1;grid-row:2}
  .hero-side{grid-column:2;grid-row:1 / span 2;align-self:end}
  .hero > .eyebrow{grid-column:1 / -1;grid-row:1}
  .eyebrow{display:flex;align-items:center;gap:14px;margin-bottom:32px;grid-column:1 / -1}
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px color-mix(in oklab, var(--accent) 18%, transparent)}
  .name{
    font-family:'Instrument Serif',serif;
    font-weight:400;
    font-size:clamp(56px, 9vw, 124px);
    line-height:0.9;
    letter-spacing:-0.025em;
    color:var(--ink);
  }
  .name em{font-style:italic;color:var(--accent)}
  .role{
    margin-top:28px;
    font-size:15px;line-height:1.55;color:var(--ink-soft);
    max-width:48ch;
  }
  .role strong{color:var(--ink);font-weight:500}

  .hero-side{
    display:flex;flex-direction:column;align-items:flex-end;gap:24px;
    position:relative;
  }
  .portrait{
    width:100%;max-width:340px;aspect-ratio:4/5;
    background:url('assets/portrait.jpeg') center 25%/cover no-repeat;
    filter:grayscale(0.15) contrast(1.02);
    border-radius:2px;
    position:relative;
  }
  .portrait::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg, transparent 50%, rgba(26,23,20,0.55));
    border-radius:2px;
    pointer-events:none;
  }
  .portrait-cap{
    position:absolute;right:12px;bottom:10px;left:12px;
    z-index:2;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;
    color:rgba(255,255,255,0.92);
    text-shadow:0 1px 2px rgba(0,0,0,0.4);
    text-align:right;
  }

  /* ============== SUMMARY STRIP ============== */
  .strip{
    max-width:var(--max);margin:0 auto;
    padding:50px 32px 80px;
    border-top:1px solid var(--rule);
    border-bottom:1px solid var(--rule);
    display:grid;grid-template-columns:repeat(4,1fr);gap:48px;
    margin-top:60px;
  }
  .stat .num{
    font-family:'Instrument Serif',serif;
    font-size:64px;line-height:1;letter-spacing:-0.03em;
    color:var(--ink);
    display:flex;align-items:baseline;
  }
  .stat .num small{font-size:24px;margin-left:4px;color:var(--ink-muted)}
  .stat .lbl{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--ink-muted);margin-top:14px;line-height:1.5;
  }

  /* ============== SECTION ============== */
  section{max-width:var(--max);margin:0 auto;padding:90px 32px}
  .section-head{
    display:grid;grid-template-columns:200px 1fr;gap:60px;
    margin-bottom:60px;align-items:start;
  }
  .section-head .label{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted);
    padding-top:14px;
  }
  .section-head h2{
    font-family:'Instrument Serif',serif;font-weight:400;
    font-size:clamp(40px,5.5vw,72px);line-height:1;letter-spacing:-0.02em;
  }
  .section-head h2 em{font-style:italic;color:var(--accent)}

  /* ============== EXPERIENCE TIMELINE ============== */
  .xp-list{display:flex;flex-direction:column}
  .xp{
    display:grid;grid-template-columns:200px 1fr;gap:60px;
    padding:36px 0;
    border-top:1px solid var(--rule);
    transition:background .3s ease;
  }
  .xp:last-child{border-bottom:1px solid var(--rule)}
  .xp:hover{background:linear-gradient(90deg, transparent, color-mix(in oklab, var(--accent-soft) 40%, transparent), transparent)}
  .xp-when{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);
    padding-top:8px;
  }
  .xp-when .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-right:8px;vertical-align:middle;animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 color-mix(in oklab, var(--accent) 40%, transparent)}50%{box-shadow:0 0 0 6px transparent}}
  .xp-body h3{
    font-family:'Instrument Serif',serif;font-weight:400;
    font-size:34px;line-height:1.05;letter-spacing:-0.015em;
    margin-bottom:6px;
  }
  .xp-body .where{
    font-size:14px;color:var(--ink-soft);margin-bottom:18px;
  }
  .xp-body .where span{color:var(--ink-muted)}
  .xp-body ul{list-style:none;display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .xp-body li{
    font-size:15px;line-height:1.6;color:var(--ink-soft);
    padding-left:22px;position:relative;
  }
  .xp-body li::before{
    content:"";position:absolute;left:0;top:11px;
    width:10px;height:1px;background:var(--ink-muted);
  }
  .xp-body li b{color:var(--ink);font-weight:500}
  .xp-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:18px}
  .tag{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.06em;
    color:var(--ink-soft);padding:4px 9px;
    border:1px solid var(--rule);border-radius:999px;
    background:color-mix(in oklab, var(--paper) 70%, white);
  }

  /* ============== HIGHLIGHTS ============== */
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--rule);border:1px solid var(--rule)}
  .card{
    background:var(--paper);
    padding:36px 32px 40px;
    display:flex;flex-direction:column;gap:14px;
    transition:background .35s ease;
  }
  .card:hover{background:color-mix(in oklab, var(--paper) 70%, white)}
  .card .kicker{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent)}
  .card h4{font-family:'Instrument Serif',serif;font-weight:400;font-size:30px;line-height:1.05;letter-spacing:-0.015em}
  .card p{font-size:14px;line-height:1.6;color:var(--ink-soft)}
  .card .meta{
    margin-top:auto;padding-top:18px;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);
    display:flex;justify-content:space-between;
  }

  /* ============== SKILLS ============== */
  .sk-note{
    font-size:14px;line-height:1.6;color:var(--ink-soft);
    margin:-30px 0 50px;max-width:60ch;font-style:italic;
  }
  .sk-sub{
    font-style:italic;text-transform:none;letter-spacing:0;color:var(--ink-muted);
    font-family:'Instrument Serif',serif;font-size:13px;margin-left:6px;
  }
  .skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:60px}
  .skill-col h5{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
    color:var(--ink-muted);margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--rule);
  }
  .skill-row{
    display:grid;grid-template-columns:1fr auto;align-items:baseline;gap:16px;
    padding:14px 0;border-bottom:1px dashed var(--rule);
  }
  .skill-row .name-s{font-size:16px;color:var(--ink)}
  .skill-row .lvl{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);
  }
  .bar{
    grid-column:1/-1;height:2px;background:var(--rule);border-radius:2px;overflow:hidden;margin-top:8px;
  }
  .bar > span{display:block;height:100%;background:var(--ink);transform-origin:left;animation:fill 1.2s cubic-bezier(.2,.7,.2,1) both}
  @keyframes fill{from{transform:scaleX(0)}}

  /* ============== EDUCATION + LANG ============== */
  .two-col{display:grid;grid-template-columns:1.2fr 1fr;gap:80px}
  .edu-item{padding:24px 0;border-top:1px solid var(--rule)}
  .edu-item:last-child{border-bottom:1px solid var(--rule)}
  .edu-item h4{font-family:'Instrument Serif',serif;font-weight:400;font-size:28px;letter-spacing:-0.015em;line-height:1.1}
  .edu-item .school{
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);
    margin-top:6px;display:flex;justify-content:space-between;
  }
  .edu-item p{font-size:14px;line-height:1.55;color:var(--ink-soft);margin-top:12px}

  .lang-card{padding:28px 0;border-top:1px solid var(--rule);display:flex;align-items:baseline;justify-content:space-between;gap:20px}
  .lang-card:last-child{border-bottom:1px solid var(--rule)}
  .lang-card .l{font-family:'Instrument Serif',serif;font-size:32px;letter-spacing:-0.015em}
  .lang-card .lv{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted)}
  .dots{display:flex;gap:5px;margin-top:8px}
  .dots span{width:8px;height:8px;border-radius:50%;background:var(--rule)}
  .dots span.on{background:var(--ink)}
  .dots span.half{background:linear-gradient(90deg,var(--ink) 50%,var(--rule) 50%)}

  /* ============== PHILOSOPHY ============== */
  .quote{
    max-width:var(--max);margin:0 auto;padding:60px 32px 100px;
    text-align:center;
  }
  .quote q{
    font-family:'Instrument Serif',serif;font-style:italic;
    font-size:clamp(28px,3.5vw,46px);line-height:1.25;letter-spacing:-0.015em;
    color:var(--ink);
    quotes:"“" "”";
  }
  .quote q::before, .quote q::after{color:var(--accent);font-size:1.2em;font-style:normal}
  .quote .who{
    margin-top:28px;
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-muted);
  }

  /* ============== FOOTER (excluded from PDF) ============== */
  .footer{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:rgba(26,23,20,0.94);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    color:#f4ede0;
    border-top:1px solid rgba(255,255,255,0.08);
  }
  .footer-inner{
    max-width:var(--max);margin:0 auto;
    padding:18px 32px;
    display:flex;align-items:center;justify-content:space-between;gap:24px;
  }
  .foot-left{display:flex;align-items:center;gap:18px;font-size:13px;color:rgba(244,237,224,0.7)}
  .foot-left a{color:rgba(244,237,224,0.85);display:inline-flex;align-items:center}
  .foot-left a:hover{color:#fff}
  .foot-left a svg{width:16px;height:16px;display:block}
  .foot-actions{display:flex;align-items:center;gap:10px}
  .toggle{
    display:flex;background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);border-radius:999px;padding:3px;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
  }
  .toggle button{
    background:transparent;border:0;cursor:pointer;color:rgba(244,237,224,0.6);
    padding:7px 14px;border-radius:999px;font:inherit;letter-spacing:inherit;
    transition:all .25s ease;
  }
  .toggle button.active{background:#f4ede0;color:#1a1714}
  .toggle button:hover:not(.active){color:#f4ede0}
  .pdf-btn{
    display:inline-flex;align-items:center;gap:8px;
    background:#f4ede0;color:#1a1714;border:0;cursor:pointer;
    padding:10px 18px;border-radius:999px;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;
    transition:transform .2s ease, background .2s ease;
  }
  .pdf-btn:hover{background:#fff;transform:translateY(-1px)}
  .pdf-btn svg{width:13px;height:13px}

  /* ============== RESPONSIVE ============== */
  @media (max-width: 880px){
    /* Fluid side padding: starts at desktop's 32px at breakpoint, shrinks to 0 by ~360px */
    :root{
      --gutter: clamp(14px, calc((100vw - 360px) / (880 - 360) * 34 + 14px), 48px);
    }
    .topbar-inner{padding-left:var(--gutter);padding-right:var(--gutter)}

    /* Asymmetric overlap hero: portrait floats top-right next to the name, */
    /* shrinking fluidly so it always fits beside the text — never on top. */
    .hero{
      display:block;
      padding:40px var(--gutter) 20px;
      position:relative;
      overflow:hidden;
    }
    .hero::after{content:"";display:block;clear:both}
    .hero-main{display:contents}
    .hero-side{display:contents}
    .eyebrow{margin:0 0 24px;float:none;clear:both;width:100%;display:flex;position:relative;z-index:2}
    .hero-side .portrait{
      float:right;
      /* Fluid: ~190px at 880, scales down to ~78px at 360. Always fits beside name. */
      width:clamp(78px, calc(78px + (100vw - 360px) * 0.215), 190px);
      aspect-ratio:4/5;
      max-width:none;
      margin:0 0 12px clamp(12px, 3vw, 24px);
      shape-outside:inset(0);
    }
    .hero-side .portrait-cap{
      position:absolute;right:8px;bottom:6px;left:8px;
      width:auto;
      max-width:none;
      margin:0;
      text-align:right;
      display:block;
      font-size:8px;
      color:rgba(255,255,255,0.92);
      text-shadow:0 1px 2px rgba(0,0,0,0.4);
      float:none;
    }
    .eyebrow{margin-bottom:24px;clear:right;float:left;width:100%}
    .name{
      /* Fluid name size shrinks alongside the portrait so they coexist cleanly. */
      font-size:clamp(40px, calc(40px + (100vw - 360px) * 0.092), 88px);
      line-height:0.94;
    }
    .role{
      clear:both;
      margin-top:28px;
      font-size:15px;
      max-width:none;
    }

    .strip{grid-template-columns:repeat(2,1fr);gap:32px;padding:40px var(--gutter) 60px}
    section{padding:60px var(--gutter)}
    .quote{padding-left:var(--gutter);padding-right:var(--gutter)}
    .footer-inner{padding-left:var(--gutter);padding-right:var(--gutter)}
    .section-head{grid-template-columns:1fr;gap:16px}
    .xp{grid-template-columns:1fr;gap:16px}
    .grid-3{grid-template-columns:1fr}
    .skills-grid{grid-template-columns:1fr;gap:32px}
    .two-col{grid-template-columns:1fr;gap:40px}
    .topbar nav{display:none}
    .footer-inner{flex-wrap:wrap;justify-content:center;text-align:center}
    .foot-left{order:2;width:100%;justify-content:center}
    body{padding-bottom:170px}
  }

  /* Below 360px (extreme) — keep portrait beside name but very small */
  @media (max-width: 360px){
    .hero-side .portrait{width:72px;margin-left:10px}
    .name{font-size:38px}
  }

  /* ============== PRINT ============== */
  @media print{
    @page{size:A4;margin:14mm 12mm}
    html,body{background:#fff;color:#000}
    body{padding:0}
    .topbar,.footer,.portrait-cap{display:none !important}
    .hero{padding:0 0 12px;grid-template-columns:1.5fr 1fr;gap:30px;page-break-after:avoid}
    .name{font-size:52px}
    .strip{padding:14px 0;margin-top:14px;page-break-inside:avoid;gap:20px}
    .stat .num{font-size:32px}
    .stat .num small{font-size:14px}
    section{padding:24px 0;page-break-inside:avoid}
    .section-head{margin-bottom:20px;gap:24px;grid-template-columns:160px 1fr}
    .section-head h2{font-size:36px}
    .xp{padding:14px 0;gap:24px;grid-template-columns:140px 1fr;page-break-inside:avoid}
    .xp-body h3{font-size:20px}
    .xp-body li{font-size:11.5px;line-height:1.45}
    .xp-body .where{font-size:11px}
    .grid-3{grid-template-columns:repeat(3,1fr)}
    .card{padding:14px;page-break-inside:avoid}
    .card h4{font-size:16px}
    .card p{font-size:11px}
    .skills-grid{gap:30px}
    .skill-row .name-s{font-size:12px}
    .two-col{gap:30px}
    .edu-item h4{font-size:16px}
    .lang-card .l{font-size:18px}
    .quote{padding:24px 0}
    .quote q{font-size:20px}
    .portrait{filter:grayscale(1);max-width:200px}
    a[href]:after{content:""}
  }

  /* slide-up reveal */
  .reveal{opacity:0;transform:translateY(18px);transition:opacity .8s ease, transform .8s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <span class="mono">JJC · CV · 2026</span>
    <nav id="topbar-nav"></nav>
    <span class="mono"><span id="topbar-loc"></span></span>
  </div>
</div>

<!-- ===================== HERO ===================== -->
<header class="hero">
  <div class="eyebrow">
    <span class="dot"></span>
    <span class="mono" id="hero-eyebrow"></span>
  </div>
  <aside class="hero-side">
    <div class="portrait" role="img" aria-label="Juan José Cano Duque">
      <span class="portrait-cap" id="hero-cap"></span>
    </div>
  </aside>
  <div class="hero-main">
    <h1 class="name">Juan&nbsp;José<br/>Cano <em>Duque</em>.</h1>
    <p class="role">
      <strong id="hero-role"></strong>
      <span id="hero-bio"></span>
    </p>
  </div>
</header>

<!-- ===================== STATS ===================== -->
<div class="strip" id="stats-strip"></div>

<!-- ===================== CAPABILITIES ===================== -->
<section id="capabilities">
  <div class="section-head">
    <div class="label" id="cap-label"></div>
    <h2><span id="cap-h2a"></span> <em id="cap-h2b"></em></h2>
  </div>
  <div class="grid-3" id="cap-grid"></div>
</section>

<!-- ===================== WORK ===================== -->
<section id="work">
  <div class="section-head">
    <div class="label" id="work-label"></div>
    <h2><span id="work-h2a"></span> <em id="work-h2b"></em></h2>
  </div>
  <div class="xp-list" id="xp-list"></div>
</section>

<!-- ===================== HIGHLIGHTS ===================== -->
<section id="highlights">
  <div class="section-head">
    <div class="label" id="hl-label"></div>
    <h2><span id="hl-h2a"></span> <em id="hl-h2b"></em></h2>
  </div>
  <div class="grid-3" id="hl-grid"></div>
</section>

<!-- ===================== SKILLS ===================== -->
<section id="skills">
  <div class="section-head">
    <div class="label" id="sk-label"></div>
    <h2><span id="sk-h2a"></span> <em id="sk-h2b"></em></h2>
  </div>
  <p class="sk-note" id="sk-note"></p>
  <div class="skills-grid" id="skills-grid"></div>
</section>

<!-- ===================== EDUCATION + LANG ===================== -->
<section id="education">
  <div class="section-head">
    <div class="label" id="ed-label"></div>
    <h2><span id="ed-h2a"></span> <em id="ed-h2b"></em></h2>
  </div>
  <div class="two-col">
    <div id="ed-degrees"></div>
    <div id="ed-langs"></div>
  </div>
</section>

<!-- ===================== QUOTE ===================== -->
<div class="quote">
  <q id="quote-text"></q>
  <div class="who" id="quote-who"></div>
</div>

<!-- ===================== FOOTER ===================== -->
<footer class="footer" id="site-footer">
  <div class="footer-inner">
    <div class="foot-left">
      <span class="mono">© 2026</span>
      <a id="foot-email" href="#"></a>
      <a id="foot-linkedin" href="#" target="_blank" rel="noopener"></a>
      <a id="foot-github" href="#" target="_blank" rel="noopener"></a>
    </div>
    <div class="foot-actions">
      <div class="toggle" role="group" aria-label="Language">
        <button id="lang-en" class="active" type="button">EN</button>
        <button id="lang-es" type="button">ES</button>
      </div>
      <button id="pdf-btn" class="pdf-btn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="pdf-label">Download PDF</span>
      </button>
    </div>
  </div>
</footer>

<script>
/* ============== CONTENT-DRIVEN RENDER ============== */
const cache = {};
let currentLang = 'en';
let revealObserver = null;

async function loadLang(lang){
  if (!cache[lang]) {
    const res = await fetch('content/' + lang + '.json');
    cache[lang] = await res.json();
  }
  return cache[lang];
}

function renderTopbar(data){
  const nav = document.getElementById('topbar-nav');
  nav.innerHTML = `
    <a href="#capabilities">${data.ui.nav.capabilities}</a>
    <a href="#work">${data.ui.nav.work}</a>
    <a href="#highlights">${data.ui.nav.highlights}</a>
    <a href="#skills">${data.ui.nav.skills}</a>
    <a href="#education">${data.ui.nav.education}</a>
  `;
  document.getElementById('topbar-loc').textContent = data.meta.location;
}

function renderHero(data){
  document.getElementById('hero-eyebrow').textContent = data.meta.availability;
  document.getElementById('hero-cap').textContent = data.meta.portraitCaption;
  document.getElementById('hero-role').textContent = data.meta.title;
  document.getElementById('hero-bio').innerHTML = ' ' + data.meta.bio;
}

function renderStats(stats){
  document.getElementById('stats-strip').innerHTML = stats.map(s => `
    <div class="stat">
      <div class="num">${s.value}${s.unit ? `<small>${s.unit}</small>` : ''}</div>
      <div class="lbl">${s.label}</div>
    </div>
  `).join('');
}

function renderSectionHead(prefix, sec){
  document.getElementById(prefix + '-label').textContent = sec.label;
  document.getElementById(prefix + '-h2a').textContent = sec.headingPre;
  document.getElementById(prefix + '-h2b').textContent = sec.headingEm;
}

function renderCapabilities(cap){
  renderSectionHead('cap', cap);
  document.getElementById('cap-grid').innerHTML = cap.items.map(it => `
    <article class="card">
      <span class="kicker">${it.kicker}</span>
      <h4>${it.title}</h4>
      <p>${it.body}</p>
    </article>
  `).join('');
}

function renderWork(work){
  renderSectionHead('work', work);
  document.getElementById('xp-list').innerHTML = work.items.map((j, idx) => {
    const dot = idx === 0 ? '<span class="dot"></span>' : '';
    const where = j.client
      ? `<b>${j.company}</b> <span>·</span> <span>${j.client}</span>`
      : `<b>${j.company}</b>`;
    const tags = j.tags && j.tags.length
      ? `<div class="xp-tags">${j.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`
      : '';
    return `
      <div class="xp">
        <div class="xp-when">${dot}${j.period}</div>
        <div class="xp-body">
          <h3>${j.role}</h3>
          <div class="where">${where}</div>
          <ul>${j.bullets.map(b => `<li>${b}</li>`).join('')}</ul>
          ${tags}
        </div>
      </div>
    `;
  }).join('');
}

function renderHighlights(hl){
  renderSectionHead('hl', hl);
  document.getElementById('hl-grid').innerHTML = hl.items.map(h => `
    <article class="card">
      <span class="kicker">${h.kicker}</span>
      <h4>${h.title}</h4>
      <p>${h.body}</p>
      <div class="meta"><span>${h.metaLeft}</span><span>${h.metaRight}</span></div>
    </article>
  `).join('');
}

function renderSkills(sk){
  renderSectionHead('sk', sk);
  document.getElementById('sk-note').textContent = sk.note;
  document.getElementById('skills-grid').innerHTML = sk.columns.map(col => {
    const sub = col.subtitle ? ` <span class="sk-sub">${col.subtitle}</span>` : '';
    return `
      <div class="skill-col">
        <h5>${col.title}${sub}</h5>
        ${col.rows.map(r => `
          <div class="skill-row">
            <span class="name-s">${r.name}</span>
            <span class="lvl">${r.level}</span>
            <div class="bar"><span style="width:${r.bar}%"></span></div>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

function renderEducation(ed){
  renderSectionHead('ed', ed);
  document.getElementById('ed-degrees').innerHTML = ed.degrees.map(d => `
    <div class="edu-item">
      <h4>${d.title}</h4>
      <div class="school"><span>${d.school}</span><span>${d.year}</span></div>
      <p>${d.body}</p>
    </div>
  `).join('');

  const dotMarkup = (count, half) => {
    const total = 5;
    let s = '';
    for (let i = 0; i < count; i++) s += '<span class="on"></span>';
    if (half) s += '<span class="half"></span>';
    const filled = count + (half ? 1 : 0);
    for (let i = filled; i < total; i++) s += '<span></span>';
    return s;
  };

  const langCards = ed.languages.map(l => `
    <div class="lang-card">
      <div>
        <div class="l">${l.name}</div>
        <div class="dots">${dotMarkup(l.dots, l.half)}</div>
      </div>
      <span class="lv">${l.level}</span>
    </div>
  `).join('');

  const hobbies = ed.hobbies ? `
    <div class="lang-card">
      <div>
        <div class="l">${ed.hobbies.label}</div>
        <div class="dots">${dotMarkup(ed.hobbies.dots, ed.hobbies.half)}</div>
      </div>
      <span class="lv">${ed.hobbies.value}</span>
    </div>
  ` : '';

  document.getElementById('ed-langs').innerHTML = langCards + hobbies;
}

function renderQuote(q){
  document.getElementById('quote-text').textContent = q.text;
  document.getElementById('quote-who').textContent = q.who;
}

const ICONS = {
  mail: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,7 12,13 21,7"/></svg>',
  linkedin: '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19a.66.66 0 000 .14V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z"/></svg>',
  github: '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.1.39-1.99 1.03-2.69-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.59 1.03 2.69 0 3.84-2.34 4.69-4.57 4.94.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"/></svg>',
};

function renderFooter(data){
  const email = document.getElementById('foot-email');
  email.href = 'mailto:' + data.meta.email;
  email.title = data.meta.email;
  email.setAttribute('aria-label', 'Email: ' + data.meta.email);
  email.innerHTML = ICONS.mail;

  const ln = document.getElementById('foot-linkedin');
  ln.href = data.meta.linkedin;
  ln.title = 'LinkedIn ' + data.meta.linkedinHandle;
  ln.setAttribute('aria-label', 'LinkedIn ' + data.meta.linkedinHandle);
  ln.innerHTML = ICONS.linkedin;

  const gh = document.getElementById('foot-github');
  gh.href = data.meta.github;
  gh.title = 'GitHub ' + data.meta.githubHandle;
  gh.setAttribute('aria-label', 'GitHub ' + data.meta.githubHandle);
  gh.innerHTML = ICONS.github;

  document.getElementById('pdf-label').textContent = data.ui.downloadPdf;
}

function renderAll(data){
  renderTopbar(data);
  renderHero(data);
  renderStats(data.stats);
  renderCapabilities(data.capabilities);
  renderWork(data.work);
  renderHighlights(data.highlights);
  renderSkills(data.skills);
  renderEducation(data.education);
  renderQuote(data.quote);
  renderFooter(data);
}

/* ============== reveal on scroll (re-init after each render) ============== */
function setupReveal(){
  if (revealObserver) revealObserver.disconnect();
  revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in');
        revealObserver.unobserve(e.target);
      }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.xp, .card, .stat, .edu-item, .lang-card, .skill-row').forEach((el, i) => {
    el.classList.add('reveal');
    el.style.transitionDelay = (Math.min(i, 8) * 40) + 'ms';
    revealObserver.observe(el);
  });
}

async function setLang(lang){
  currentLang = lang;
  document.documentElement.lang = lang;
  const data = await loadLang(lang);
  document.title = data.ui.documentTitle;
  renderAll(data);
  document.getElementById('lang-en').classList.toggle('active', lang === 'en');
  document.getElementById('lang-es').classList.toggle('active', lang === 'es');
  try { if (lang === 'en' || lang === 'es') localStorage.setItem('cv.lang', lang); } catch(e) {}
  setupReveal();
}

document.getElementById('lang-en').addEventListener('click', () => setLang('en'));
document.getElementById('lang-es').addEventListener('click', () => setLang('es'));

document.getElementById('pdf-btn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.href = `cv-${currentLang}.pdf`;
  link.download = `Juan-Jose-Cano-Duque-CV-${currentLang.toUpperCase()}.pdf`;
  document.body.appendChild(link);
  link.click();
  link.remove();
});

// Init
let initial = 'en';
try {
  const saved = localStorage.getItem('cv.lang');
  if (saved === 'es' || saved === 'en') initial = saved;
} catch(e) {}
const urlLang = new URLSearchParams(location.search).get('lang');
if (['en', 'es', 'en-ai', 'es-ai'].includes(urlLang)) initial = urlLang;
setLang(initial);
</script>

</body>
</html>
